name: Release

on:
  workflow_run:
    workflows:
      - "Bump"
    types:
      - completed

permissions:
  contents: write

env:
  TAG: ${{ github.sha }}
  SCHEME: GitOK
  DESTINATION: "generic/platform=macOS"
  ArchivePath: "./my-app"
  BuildPath: "./temp"
  IS_PRERELEASE: true

jobs:
  build_with_signing:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_branch }}
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable"
      - name: 安装依赖
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -fsSL \
            --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' \
            --header 'user-agent: GitOK-Release-Workflow' \
            https://raw.githubusercontent.com/nookery/servon/main/install.sh | bash
      - name: Verify Xcode version
        run: |
          echo "Current Xcode version:"
          xcodebuild -version
          echo "Swift version:"
          xcrun swift --version
          echo "Xcode path:"
          xcode-select -p
      - name: 获取最新 tag
        id: get_tag
        run: |
          tag=$(git describe --tags --abbrev=0)
          echo "TAG=$tag" >> $GITHUB_ENV
          if [[ $tag == p* ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
            previous_tag=$(git tag -l "p[0-9]*" | sort -V | grep -Fxv "$tag" | tail -n 1)
            if [ -z "$previous_tag" ]; then
              previous_tag=$(git tag -l "v*" | sort -V | tail -n 1)
            fi
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
            previous_tag=$(git tag -l "v*" | sort -V | grep -Fxv "$tag" | tail -n 1)
          fi
          echo "PREVIOUS_TAG=$previous_tag" >> $GITHUB_ENV
      - name: Setup macOS signing
        id: signing
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_CERTIFICATE_P12_PASSWORD: ${{ secrets.BUILD_CERTIFICATE_P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64_GITOK_MACOS }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_KEY_ISSER_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ISSER_ID }}
        run: |
          chmod +x ./.github/scripts/setup-macos-signing.sh
          source ./.github/scripts/setup-macos-signing.sh
          echo "signing_identity=$SIGNING_IDENTITY" >> $GITHUB_OUTPUT
          echo "team_id=$TEAM_ID" >> $GITHUB_OUTPUT
          echo "pp_path=$PP_PATH" >> $GITHUB_OUTPUT
          echo "api_key_path=$API_KEY_PATH" >> $GITHUB_OUTPUT
      - name: Build App (arm64)
        run: servon xcode build --scheme ${{ env.SCHEME }} --arch arm64 --clean=false -v
      - name: Build App (x86_64)
        run: servon xcode build --scheme ${{ env.SCHEME }} --arch x86_64 --clean=false -v
      - name: Codesign App
        run: |
          servon xcode codesign --path ./temp/arm64/Build/Products/Release/${{ env.SCHEME }}.app \
            --identity ${{ steps.signing.outputs.signing_identity }}
          servon xcode codesign --path ./temp/x86_64/Build/Products/Release/${{ env.SCHEME }}.app \
            --identity ${{ steps.signing.outputs.signing_identity }}
      - name: Create DMG
        run: |
          set -euo pipefail
          chmod +x .github/scripts/install-create-dmg.sh
          chmod +x .github/scripts/create-branded-dmg.sh
          .github/scripts/create-branded-dmg.sh \
            ./temp/arm64/Build/Products/Release/${{ env.SCHEME }}.app \
            arm64 \
            ./temp
          .github/scripts/create-branded-dmg.sh \
            ./temp/x86_64/Build/Products/Release/${{ env.SCHEME }}.app \
            x86_64 \
            ./temp
          ls -alh ./temp/*.dmg
      - name: Notary
        continue-on-error: true
        run: |
          for file in $(find . -maxdepth 2 -type f -name "*.dmg"); do
            echo "🔐 Notarizing $file"
            xcrun notarytool submit "$file" \
              --key ${{ steps.signing.outputs.api_key_path }} \
              --key-id=${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
              --issuer ${{ secrets.APP_STORE_CONNECT_KEY_ISSER_ID }} \
              --wait \
              --timeout 10m
            stapler staple "$file"
          done
      - name: 公证结果
        continue-on-error: true
        run: |
          for file in $(find . -maxdepth 2 -type f -name "*.dmg"); do
            echo "✅ Validating $file"
            stapler validate "$file"
          done
      - name: Check
        run: |
          ls -alh
          mkdir updates
          cp ./temp/*.dmg updates/
          echo "the updates is in ${{ github.workspace }}/updates"
          ls -alh updates
      - name: Generate Changelog
        run: |
          TAG="${{ env.TAG }}"
          PREVIOUS_TAG="${{ env.PREVIOUS_TAG }}"

          if [ -z "$PREVIOUS_TAG" ]; then
            NOTES="## Release ${TAG}\n\nInitial release"
          else
            CHANGES=$(git log ${PREVIOUS_TAG}..HEAD --no-merges --pretty=format:'- %s' \
              | grep -Ev '^- (ci|chore|build|style|test)(\(|:)' \
              | grep -Ev '^- 👷 CI:' \
              | sort -u \
              | head -20)
            if [ -z "$CHANGES" ]; then
              CHANGES="- Maintenance and stability improvements"
            fi
            NOTES="## Release ${TAG}\n\n### Changes since ${PREVIOUS_TAG}\n\n${CHANGES}"
          fi

          echo -e "$NOTES" > changelog.md
          cat changelog.md >> $GITHUB_STEP_SUMMARY
      - name: generate appcasts (production only)
        if: env.IS_PRERELEASE == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPARKLE_VERSION: "2.8.1"
        run: |
          set -euo pipefail

          chmod +x .github/scripts/install-sparkle-tools.sh
          SPARKLE_BIN="$(SPARKLE_VERSION="${SPARKLE_VERSION}" .github/scripts/install-sparkle-tools.sh)"

          if [ ! -x "$SPARKLE_BIN/generate_appcast" ]; then
            echo "❌ Sparkle generate_appcast not found at $SPARKLE_BIN"
            exit 1
          fi

          RELEASE_NOTES_HTML=$(cat changelog.md | gh api markdown -F text=@- -f mode=gfm)

          for arch in arm64 x86_64; do
            input_dir="appcast_input_${arch}"
            appcast_file="appcast-${arch}.xml"
            rm -rf "$input_dir"
            mkdir -p "$input_dir"
            cp ./updates/*${arch}*.dmg "$input_dir/"
            ls -alh "$input_dir"

            echo "🔑 Generating appcast for $arch..."
            echo "${{ secrets.SPARKLE_PRIVATE_KEY_GITOK }}" | "${SPARKLE_BIN}/generate_appcast" --ed-key-file - "$input_dir"

            if [ ! -f "$input_dir/appcast.xml" ]; then
              echo "❌ generate_appcast did not produce appcast.xml for $arch"
              ls -la "$input_dir"
              exit 1
            fi

            cp "$input_dir/appcast.xml" "$appcast_file"

            dmg_file=$(basename "$(ls "$input_dir"/*.dmg | head -n 1)")
            export u="https://github.com/CofficLab/GitOK/releases/latest/download/$dmg_file"
            export RELEASE_NOTES_HTML
            export RELEASE_NOTES_LINK="https://github.com/CofficLab/GitOK/releases/latest"

            # 只更新最新一条（第一个 item）的下载地址
            perl -i -pe 'if (!$done) { s/(enclosure url=")[^"]*/$1.$ENV{u}/e && ($done=1) }' "$appcast_file"

            # 只给最新一条注入 release notes
            perl -i -0777 -pe '
              if (!$done++) {
                my $notes = $ENV{RELEASE_NOTES_HTML} // "";
                my $link = $ENV{RELEASE_NOTES_LINK} // "";
                my $insert = qq{\n            <description><![CDATA[$notes]]></description>\n            <sparkle:fullReleaseNotesLink>$link</sparkle:fullReleaseNotesLink>};
                s/(<sparkle:minimumSystemVersion>[^<]+<\/sparkle:minimumSystemVersion>)(?!\s*<description)/$1$insert/s;
              }
            ' "$appcast_file"
          done

          # 兼容旧版本客户端（仍读取 appcast.xml）
          cp appcast-arm64.xml appcast.xml
      - name: 发布 Release (prerelease)
        if: success() && env.IS_PRERELEASE == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG }}
          prerelease: true
          body_path: changelog.md
          files: ./updates/*.dmg
      - name: 发布 Release
        if: success() && env.IS_PRERELEASE == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG }}
          prerelease: false
          body_path: changelog.md
          files: |
            ./updates/*.dmg
            ./appcast.xml
            ./appcast-arm64.xml
            ./appcast-x86_64.xml
      # =================================================================================================
      # 上传 DMG 到 Cloudflare R2
      # =================================================================================================
      - name: Upload DMG to R2
        if: success()
        env:
          WEBHOOK_SECRET: ${{ secrets.COFFIC_APP_UPLOAD_KEY }}
          API_URL: https://data.coffic.cn
        run: |
          set -euo pipefail

          for DMG_FILE in ./updates/*.dmg; do
            if [ ! -f "$DMG_FILE" ]; then
              echo "⚠️  No DMG file found to upload"
              continue
            fi

            DMG_FILENAME=$(basename "$DMG_FILE")
            R2_KEY="gitok/${DMG_FILENAME}"

            echo "📤 Uploading DMG to R2: $R2_KEY"

            RESPONSE=$(curl -s -X POST "${API_URL}/lumi/upload" \
              -H "X-Webhook-Secret: ${WEBHOOK_SECRET}" \
              -F "file=@${DMG_FILE}" \
              -F "key=${R2_KEY}")

            echo "Response: $RESPONSE"

            if echo "$RESPONSE" | grep -q '"success":true'; then
              R2_DMG_URL=$(echo "$RESPONSE" | grep -o '"url":"[^"]*' | cut -d'"' -f4)
              echo "✅ DMG uploaded: $R2_DMG_URL"
            else
              echo "❌ Failed to upload DMG to R2"
              exit 1
            fi
          done

      # =================================================================================================
      # 上传 appcast 到 Cloudflare R2（让 api.kuaiyizhi.cn/gitok/appcast.xml 可用）
      # =================================================================================================
      - name: Upload appcast to Cloudflare R2
        if: success() && env.IS_PRERELEASE == 'false'
        env:
          WEBHOOK_SECRET: ${{ secrets.COFFIC_APP_UPLOAD_KEY }}
          API_URL: https://data.coffic.cn
        run: |
          set -euo pipefail

          for APPCAST_FILE in appcast.xml appcast-arm64.xml appcast-x86_64.xml; do
            if [ ! -f "$APPCAST_FILE" ]; then
              echo "⚠️  $APPCAST_FILE not found, skipping"
              continue
            fi

            R2_KEY="gitok/${APPCAST_FILE}"
            echo "📤 Uploading appcast to R2: $R2_KEY"

            RESPONSE=$(curl -s -X POST "${API_URL}/lumi/upload" \
              -H "X-Webhook-Secret: ${WEBHOOK_SECRET}" \
              -F "file=@${APPCAST_FILE}" \
              -F "key=${R2_KEY}")

            echo "Response: $RESPONSE"

            if echo "$RESPONSE" | grep -q '"success":true'; then
              echo "✅ $APPCAST_FILE uploaded to R2"
            else
              echo "❌ Failed to upload $APPCAST_FILE to R2"
            fi
          done